version: 2

project_name: upag

builds:
  - id: upag
    main: .
    binary: upag
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: tarball
    ids:
      - upag
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: deb
    package_name: upag
    ids:
      - upag
    formats:
      - deb
    maintainer: "Michael Lahr"
    description: "Internal HTTP(S) uptime monitor with SQLite or PostgreSQL state storage and email alerts."
    homepage: "https://github.com/mlahr/upag"
    section: net
    priority: optional
    bindir: /usr/bin
    dependencies:
      - adduser
      - lsb-base
    contents:
      - src: packaging/debian/upag.config.yaml
        dst: /etc/upag/config.yaml
        type: config|noreplace
        file_info:
          mode: 0640
      - src: packaging/debian/upag.default
        dst: /etc/default/upag
        type: config|noreplace
        file_info:
          mode: 0644
      - src: packaging/debian/upag.init
        dst: /etc/init.d/upag
        file_info:
          mode: 0755
      - src: packaging/debian/upag.service
        dst: /lib/systemd/system/upag.service
        file_info:
          mode: 0644
      - dst: /var/lib/upag
        type: dir
        file_info:
          mode: 0750
      - dst: /run/upag
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: packaging/debian/postinstall.sh
      preremove: packaging/debian/preremove.sh
      postremove: packaging/debian/postremove.sh

release:
  github:
    owner: mlahr
    name: upag
