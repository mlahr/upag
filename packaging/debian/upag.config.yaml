smtp:
  host: smtp.example.com
  port: 587
  tls: starttls
  username: alerts@example.com
  password: change-me
  from: alerts@example.com
  to:
    - ops@example.com

alerts:
  notification_retries:
    max_attempts: 3
    backoff: [1m, 5m, 15m]

http:
  address: 127.0.0.1
  port: 0

observer:
  enabled: true
  interval: 30s
  timeout: 5s
  failure_threshold: 3
  recovery_threshold: 1
  required_successes: 1

defaults:
  interval: 60s
  timeout: 10s
  probe_retries: 2
  probe_retry_backoff: 500ms
  failure_threshold: 3
  history_retention: 720h

storage:
  backend: sqlite
  sqlite:
    path: /var/lib/upag/upag.sqlite
  probe_results:
    retention: 24h
  probe_minute_rollups:
    retention: 30d
  probe_hourly_rollups:
    retention: 1y
  probe_daily_rollups:
    retention: forever

monitors:
  - id: example
    name: Example homepage
    url: https://example.com/
    expected_status_code: 200
