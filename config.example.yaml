alerts:
  providers:
    smtp:
      host: smtp.example.com
      port: 587
      tls: starttls
      username: alerts@example.com
      password: change-me
      from: alerts@example.com
      to:
        - ops@example.com
    # To also use Mailtrap's HTTPS Transactional Email API, configure this block.
    # mailtrap:
    #   token: change-me
    #   from: alerts@example.com
    #   from_name: upag
    #   to:
    #     - ops@example.com
    # To also use Telegram Bot API alerts, configure this block.
    # telegram:
    #   token: change-me
    #   chat_ids:
    #     - "123456789"
  notification_retries:
    max_attempts: 3
    backoff: [1m, 5m, 15m]

http:
  # Optional status listener. Use port 0 to disable.
  address: 127.0.0.1
  port: 0

observer:
  # Checks whether this upag host can reach the wider network. When observer
  # connectivity is down, monitor DOWN transitions are suppressed.
  enabled: true
  interval: 30s
  timeout: 5s
  failure_threshold: 3
  recovery_threshold: 1
  required_successes: 1
  # Leave sentinels omitted or empty to use built-in public connectivity checks.
  # sentinels:
  #   - id: edge
  #     name: Edge connectivity
  #     url: https://example.com/health
  #     expected_status_code: 200

defaults:
  interval: 60s
  timeout: 10s
  probe_retries: 2
  probe_retry_backoff: 500ms
  failure_threshold: 3
  history_retention: 720h

storage:
  backend: sqlite
  sqlite:
    path: ./upag.sqlite
  # Use a PostgreSQL/Supabase connection string instead of sqlite:
  # backend: postgres
  # postgres:
  #   dsn: postgres://user:password@host:5432/postgres?sslmode=require
  probe_results:
    retention: 24h
  probe_minute_rollups:
    retention: 30d
  probe_hourly_rollups:
    retention: 1y
  probe_daily_rollups:
    retention: forever

monitors:
  - id: example
    name: Example homepage
    url: https://example.com/
    expected_status_code: 200
    max_response_time: 500ms
    response_body:
      must_contain: Example Domain
      must_not_contain: Maintenance mode
      command: ["jq", "-e", ".status == \"ok\""]
      command_timeout: 10s
