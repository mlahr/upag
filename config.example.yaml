smtp:
  host: smtp.example.com
  port: 587
  tls: starttls
  username: alerts@example.com
  password: change-me
  from: alerts@example.com
  to:
    - ops@example.com

# To also use Mailtrap's HTTPS Transactional Email API, configure this block.
# If both smtp and mailtrap are configured, alerts are sent through both.
# mailtrap:
#   token: change-me
#   from: alerts@example.com
#   from_name: upag
#   to:
#     - ops@example.com

alerts:
  notification_retries:
    max_attempts: 3
    backoff: [1m, 5m, 15m]

http:
  # Optional status listener. Use port 0 to disable.
  address: 127.0.0.1
  port: 0

defaults:
  interval: 60s
  timeout: 10s
  failure_threshold: 3
  history_retention: 720h

monitors:
  - id: example
    name: Example homepage
    url: https://example.com/
    expected_status_code: 200
    max_response_time: 500ms
    response_body:
      must_contain: Example Domain
      must_not_contain: Maintenance mode
      command: ["jq", "-e", ".status == \"ok\""]
      command_timeout: 10s
